<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light only"><title>Contact — BANUB</title><link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon.png"><link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png"><link rel="stylesheet" href="assets/styles.css?v=20260618-13"><script src="assets/data.js?v=20260618-13"></script><script src="assets/app.js?v=20260618-13" defer></script></head><body><div data-site-header></div><main><section class="page-hero"><div class="container"><h1>Contact us</h1><p>Questions about a product, order or delivery? Send us a message.</p></div></section><section class="section"><div class="container" style="max-width:850px"><div class="notice" id="contactNotice">Thank you. Your message has been submitted in this demo.</div><form class="form-grid" id="contactForm"><div class="field"><label>Name</label><input required></div><div class="field"><label>Email</label><input type="email" required></div><div class="field full"><label>Subject</label><input required></div><div class="field full"><label>Message</label><textarea required></textarea></div><div class="field full"><button class="btn accent">Send message</button></div></form></div></section></main><div data-site-footer></div><script>document.addEventListener('DOMContentLoaded',()=>document.getElementById('contactForm').addEventListener('submit',e=>{e.preventDefault();document.getElementById('contactNotice').classList.add('show');e.target.reset()}));</script></body></html>
