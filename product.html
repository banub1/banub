<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light only"><title>Product — BANUB</title><link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon.png"><link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png"><link rel="stylesheet" href="assets/styles.css?v=20260618-13"><script src="assets/data.js?v=20260618-13"></script><script src="assets/app.js?v=20260618-13" defer></script></head><body><div data-site-header></div><main><section class="section"><div class="container product-detail" id="productDetail"></div></section><section class="section tight" style="background:var(--cream)"><div class="container"><div class="section-head"><div><h2>You may also like</h2></div></div><div class="products-grid" id="related"></div></div></section></main><div data-site-footer></div><script>document.addEventListener('DOMContentLoaded',()=>{const id=new URLSearchParams(location.search).get('id');const p=BANUB_PRODUCTS.find(x=>x.id===id)||BANUB_PRODUCTS[0];document.title=p.name+' — BANUB';document.getElementById('productDetail').innerHTML=`<div><img src="${p.image}" alt="${p.name}"></div><div class="product-info"><div class="eyebrow">BANUB essentials</div><h1>${p.name}</h1><div class="price">£${p.price.toFixed(2)}</div><p>${p.description}</p><p>Designed for practical everyday use and presented in a calm, modern style.</p><div class="quantity"><button id="minus">−</button><input id="qty" value="1" readonly><button id="plus">+</button></div><button class="btn accent" id="addProduct">Add to cart</button><div class="accordion"><details open><summary>Product details</summary><p>Selected materials, neutral styling and simple care instructions. Exact specifications may be updated before live launch.</p></details><details><summary>Delivery</summary><p>Standard UK delivery information is available on our delivery page.</p></details><details><summary>Returns</summary><p>Eligible unused items may be returned in line with our returns policy.</p></details></div></div>`;let q=1;const input=document.getElementById('qty');document.getElementById('minus').onclick=()=>{q=Math.max(1,q-1);input.value=q};document.getElementById('plus').onclick=()=>{q++;input.value=q};document.getElementById('addProduct').onclick=()=>addToCart(p.id,q);renderProductGrid(document.getElementById('related'),BANUB_PRODUCTS.filter(x=>x.id!==p.id).slice(0,3))});</script></body></html>
