<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shop — BANUB</title><link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon.png"><link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png"><link rel="stylesheet" href="assets/styles.css"><script src="assets/data.js"></script><script src="assets/app.js" defer></script></head><body><div data-site-header></div><main><section class="page-hero"><div class="container"><h1>Shop the collection</h1><p>Home, workspace and everyday essentials selected for simple use and calm design.</p></div></section><section class="section"><div class="container"><div class="filters"><button class="filter-btn active" data-filter="all">All</button><button class="filter-btn" data-filter="home">Home & Living</button><button class="filter-btn" data-filter="workspace">Desk & Workspace</button><button class="filter-btn" data-filter="accessories">Accessories</button></div><div class="products-grid" id="shopGrid"></div></div></section></main><div data-site-footer></div><script>document.addEventListener('DOMContentLoaded',()=>{const grid=document.getElementById('shopGrid');const params=new URLSearchParams(location.search);let initial=params.get('category')||'all';const apply=f=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));renderProductGrid(grid,f==='all'?BANUB_PRODUCTS:BANUB_PRODUCTS.filter(p=>p.category===f))};document.querySelectorAll('.filter-btn').forEach(b=>b.onclick=()=>apply(b.dataset.filter));apply(initial)});</script></body></html>
